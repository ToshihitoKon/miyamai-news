# パイプラインの実行段階。どこまで自動的に進めるかの上限を決める。
pipeline:
  mode: digest # RSS収集, AIによるカテゴリ別選別, facts抽出(ニュース要約)
  # mode: synthesize # digest + 音声合成・BGM合成。dist/ に mp3 を書き出す。
  # mode: publish    # synthesize + GCS への publish

gcs:
  bucket: your-bucket-name
  public_base: https://storage.googleapis.com
  # publish で保持・公開する話数。
  retention_episodes: 5

assets:
  bgm_path: 古びた魔法書_気まぐれBGM工房.mp3
  # 再生ページ / Slack プレビュー用の横長バナー画像のオブジェクト名。
  # 事前に gs://<bucket>/<cover_image> へ手動アップロードしておく。
  cover_image: miyamai_news.webp
  # PWA(ホーム画面追加)用の正方形アイコンのオブジェクト名。512x512 以上推奨。
  icon_image: miyamai_news_icon.png

# VOICEPEAK(音声合成)まわり。
voicepeak:
  bin: /Applications/voicepeak.app/Contents/MacOS/voicepeak
  # 各チャンク合成後に空ける秒数。
  interval_sec: 1
  # 合成失敗時のリトライ回数と指数バックオフの初期待機秒数。
  max_retries: 4
  retry_base_sec: 2
  # 1チャンク合成に許す最大秒数。超えたら kill してリトライへ回す。
  timeout_sec: 10
  # チャンク（文）を結合する際に間に挟む無音の秒数。
  chunk_gap_sec: 0.4
  # 台本中の [interval:mid] タグ（個々のニュース記事の切り替え）で挟む無音の秒数。
  mid_pause_sec: 1.0
  # 台本中の [interval:long] タグ（カテゴリ／トピックの転換）で挟む無音の秒数。
  long_pause_sec: 2.0

# 台本生成・整形に使う AI CLI の設定。
ai_agent:
  bin: agy
  model: 'Gemini 3.5 Flash (High)'
  # ロールごとの使用モデル（未指定時は上記 model が使われます）
  selector_model: 'Gemini 3.5 Flash (High)'
  extractor_model: 'Gemini 3.5 Flash (High)'
  writer_model: 'Gemini 3.5 Flash (High)'
  formatter_model: 'Gemini 3.5 Flash (High)'
  # used_news のフォーマット崩れをパース失敗時にだけ整形し直す軽量モデル。
  # 通常は呼ばれない（未指定時は上記 model が使われます）。
  used_fix_model: 'Gemini 3.5 Flash (Low)'
  # フォーマット修復の最大リトライ回数（未指定時は 2）。0 で修復自体を無効化します。
  used_fix_max_retries: 2

# Claude Code CLI (claude) を使う場合の設定例。
# ai_agent:
#   bin: claude
#   model: claude-opus-4-8
#   # effort は claude 固有の引数。bin が claude 以外なら無視される。
#   effort: xhigh
#   selector_model: claude-sonnet-5
#   extractor_model: claude-opus-4-8
#   writer_model: claude-sonnet-5
#   formatter_model: claude-sonnet-5
#   # 修復は軽いモデル・低 effort で十分。
#   used_fix_model: claude-haiku-4-5
#   used_fix_effort: low

# 番組構成設定。
program_details:
  # 番組全体で紹介するニュースの合計本数の目安（メイン＋補欠の合計）。
  total_news_count: 8
  # カテゴリごとの表示名と選定方針。
  categories:
    # - label: カテゴリの日本語名
    #   description: ニュースのカテゴリ分類プロンプト。
    - label: "生成AI"
      description: >-
        LLM・生成AIモデルそのものに関する話題（新モデル発表、AIサービスのリリース
        など）。研究論文・研究成果は、対象がAIエージェントやAIコーディングツール
        であってもこのカテゴリに分類する（例: コーディングエージェントの内部動作を
        分析した論文）。AIエージェント・AIコーディングツールのカテゴリは、製品・
        ツール自体の動き（リリース・新機能・話題のツール）に限定する。

# RSS 収集まわり。
collect:
  # 何時間前までのニュースを取得するか。confirmed_at が無い初回のみ使われる
  # フォールバック値（詳細は CLAUDE.md「LastFetchStore / 収集 window」参照）。
  lookback_hours: 24
  # フィードキャッシュが entry を保持する日数。
  retention_days: 30
  # フィード取得の並列数。
  fetch_threads: 5
  # フィード取得のリトライ回数と、指数バックオフの初期待機秒数。
  fetch_max_retries: 3
  fetch_retry_base_sec: 2
  # 前回 fetch のキャッシュを使い回す時間。
  fetch_skip_minutes: 5
  # 直近何回分の紹介済みニュースを selector に渡して、回またぎの重複紹介を避けるか。
  used_news_history_episodes: 4

# 収集元定義。
rss_feed_sources:
  # - name:     表示名
  #   url:      フィードURL
  #   priority (high|low|<empty>): 情報源の優先度。未指定だと中間。
  #     運用例:
  #       high: 公式ブログ・公式リリースノートなどの一次情報源
  #       low: まとめ系・コミュニティ系などで流量が多いソース
  - name: "Hacker News (AI)"
    url: "https://hnrss.org/newest?q=AI+OR+LLM+OR+GPT&points=50"

# BGM 合成(ミキシング)まわり。
mixer:
  # BGM の音量。ffmpeg の volume フィルタにそのまま渡す倍率。
  bgm_volume: 0.23
  # ナレーション音声に足すゲイン(dB)。
  voice_boost_db: 6
  # BGM 開始からナレーション開始までの秒数。
  intro_sec: 3
  # ナレーション終了からフェードアウト開始までの秒数。
  tail_sec: 3
  # フェードアウトにかける秒数。
  fade_sec: 4

# Slack/Discord への digest 全文通知（任意機能）。targets に列挙した配信先だけ、
# --digest-only 実行時に facts ファイルの内容を自動投稿する（CLI フラグでの切り替えは
# 持たない）。未設定でも他の機能には影響しない。bot_token・webhook_url は
# config.yaml（gitignore対象）にのみ実値を書き、ここにはプレースホルダのみ残す。
# notify:
#   targets: [slack, discord]
#   slack:
#     bot_token: xoxb-your-bot-token
#     channel: C0123456789
#   discord:
#     webhook_url: https://discord.com/api/webhooks/your-webhook-id/your-webhook-token
