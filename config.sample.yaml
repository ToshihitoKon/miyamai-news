gcs:
  bucket: your-bucket-name
  public_base: https://storage.googleapis.com

assets:
  bgm_path: 古びた魔法書_気まぐれBGM工房.mp3
  # 再生ページ / Slack プレビュー用の横長バナー画像のオブジェクト名。
  # 事前に gs://<bucket>/<cover_image> へ手動アップロードしておく。
  cover_image: miyamai_news.webp
  # PWA(ホーム画面追加)用の正方形アイコンのオブジェクト名。512x512 以上推奨。
  icon_image: miyamai_news_icon.png

# VOICEPEAK(音声合成)まわり。
voicepeak:
  bin: /Applications/voicepeak.app/Contents/MacOS/voicepeak
  # 各チャンク合成後に空ける秒数。連続起動によるクラッシュ避け。
  interval_sec: 1
  # 合成失敗時のリトライ回数と、指数バックオフの初期待機秒数。
  max_retries: 4
  retry_base_sec: 2
  # 1チャンク合成に許す最大秒数。超えたら kill してリトライへ回す。
  timeout_sec: 10
  # チャンク（文）を結合する際に間に挟む無音の秒数。
  # 句点で区切った文がそのままつながると間延びなく聞こえてしまうため、
  # 一呼吸おけるよう無音を挟む。
  chunk_gap_sec: 0.4

# 台本生成・整形に使う AI CLI の設定。
ai_agent:
  bin: claude
  model: claude-opus-4-8
  # claude 固有の引数。bin が claude 以外なら無視される。
  effort: xhigh
  # ロールごとの使用モデル（未指定時は上記 model が使われます）
  selector_model: claude-sonnet-5
  extractor_model: claude-opus-4-8
  writer_model: claude-sonnet-5
  formatter_model: claude-sonnet-5

# RSS 収集まわり。
collect:
  # 前回 publish 記録が無い初回に、何時間前までさかのぼって収集するかの上限。
  lookback_hours: 24
  # フィードキャッシュ(feed_cache.json)が entry を保持する日数。
  # フィードに最後に見えた時刻(last_fetched_at)からこの日数を過ぎても再登場しなかった
  # entry だけをキャッシュから破棄する（フィードにまだ載っている entry は何日前に
  # 初登場したかに関わらず保持し続け、再登場による二重紹介を防ぐ）。
  retention_days: 30
  # 各カテゴリの合計目安件数。Ruby が機械的に足切りするのではなく、ニュース選定ステップ
  # の AI への指示（この件数程度に収めてほしい、という目安）に使う。ソース単位の目安は
  # 設けない（面白い記事はソースを問わず採用し、priority で優先度だけ調整する）。
  max_per_category: 100
  # フィード取得の並列数。
  fetch_threads: 5
  # フィード取得のリトライ回数と、指数バックオフの初期待機秒数。
  fetch_max_retries: 3
  fetch_retry_base_sec: 2

# 収集元定義。台本の番組構成（何本立てか）もここに定義したカテゴリ数に従う。
# 各カテゴリのキー:
#   label: extractor プロンプトで使う日本語の表示名
#   sources: そのカテゴリのソース一覧。各ソースのキー:
#     name: 表示名（収集したニュース一覧の source に入る）
#     url / urls: フィードURL。複数フィードを1ソース扱いしたい場合は urls（配列）を使う
#     top_by_bookmarks: true にすると、はてなブックマーク数を取得して選定 AI への
#       判断材料として渡す（はてブ用）
#     priority: "low" を指定すると、選定・台本作成の際に一次情報源より優先度を下げる。
#       まとめ系・コミュニティ系など玉石混交で流量が多いソース向け
rss_feed_sources:
  ai:
    label: "生成AI"
    sources:
      - name: "Hacker News (AI)"
        url: "https://hnrss.org/newest?q=AI+OR+LLM+OR+GPT&points=50"
      - name: "arXiv cs.AI"
        url: "http://export.arxiv.org/rss/cs.AI"
      - name: "OpenAI Blog"
        url: "https://openai.com/news/rss.xml"
  # Claude Code / Devin / Cursor / Antigravity などの AI エージェント・AI コーディングツール。
  # Devin(Cognition) は公式 RSS がないため HN のキーワード検索で拾う。
  ai_agents:
    label: "AIエージェント・AIコーディングツール（Claude Code、Devin、Cursor など）"
    sources:
      - name: "Hacker News (agents)"
        url: "https://hnrss.org/newest?q=%22Claude%20Code%22%20OR%20%22coding%20agent%22%20OR%20Devin%20OR%20Cursor%20OR%20Antigravity&points=30"
      - name: "Claude Code Releases"
        url: "https://github.com/anthropics/claude-code/releases.atom"
      - name: "Cursor Changelog"
        url: "https://cursor.com/changelog/rss.xml"
      - name: "Google AI Blog"
        url: "https://blog.google/innovation-and-ai/technology/ai/rss/"
      - name: "Simon Willison's Weblog"
        url: "https://simonwillison.net/atom/everything/"
  security:
    label: "セキュリティ"
    sources:
      - name: "JPCERT/CC"
        url: "https://www.jpcert.or.jp/rss/jpcert.rdf"
      - name: "JVN"
        url: "https://jvn.jp/rss/jvn.rdf"
  engineering:
    label: "その他エンジニア向けトピック"
    sources:
      - name: "Publickey"
        url: "https://www.publickey1.jp/atom.xml"
      - name: "Hacker News (frontpage)"
        url: "https://hnrss.org/frontpage?points=100"
      - name: "Lobsters"
        url: "https://lobste.rs/rss"
      - name: "gihyo.jp"
        url: "https://gihyo.jp/feed/rss2"
      - name: "InfoQ Japan"
        url: "https://www.infoq.com/jp/feed/"
      - name: "DevelopersIO"
        url: "https://dev.classmethod.jp/feed/"
      # まとめ系・コミュニティ系は玉石混交かつ流量が多いので priority: low で優先度を下げる。
      # はてブはホットエントリと新着の両フィードを読み、ブクマ数上位だけを採用する
      # （RSS は各30件が上限で、オフセット等のパラメータは効かない）。
      - name: "はてブ テクノロジー"
        urls:
          - "https://b.hatena.ne.jp/hotentry/it.rss"
          - "https://b.hatena.ne.jp/entrylist/it.rss"
        top_by_bookmarks: true
        priority: low
      - name: "Qiita 人気記事"
        url: "https://qiita.com/popular-items/feed.atom"
        priority: low
      - name: "Zenn 新着"
        url: "https://zenn.dev/feed"
        priority: low

# BGM 合成(ミキシング)まわり。
mixer:
  # BGM の音量(ナレーションを 1.0 としたときの相対値)。
  bgm_volume: 0.15
  # BGM 開始からナレーション開始までの秒数。
  intro_sec: 3
  # ナレーション終了からフェードアウト開始までの秒数。
  tail_sec: 3
  # フェードアウトにかける秒数。
  fade_sec: 4
